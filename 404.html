<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
404 | The Flame Is Still Burning
</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--bg-main:#090909;
--bg-alt:#171212;
--bg-deep:#241E20;

--gold:#F4C16C;
--amber:#D68B44;
--copper:#9B5A38;

--cream:#F8EBD6;
--light:#FFF8EF;

--gray:#726867;

--glass:rgba(255,255,255,.04);

--border:rgba(244,193,108,.15);

--shadow:rgba(0,0,0,.65);

}

body{

font-family:
"Cormorant Garamond",
serif;

background:

radial-gradient(
circle at top,
rgba(244,193,108,.12),
transparent 30%
),

linear-gradient(
180deg,
#090909,
#171212,
#241E20
);

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

padding:30px;

color:var(--cream);

overflow:hidden;

}

.container{

max-width:950px;

text-align:center;

padding:70px;

background:var(--glass);

border-radius:35px;

border:
1px solid var(--border);

backdrop-filter:blur(15px);

box-shadow:
0 25px 70px var(--shadow);

}

.error{

font-family:
"Cinzel",
serif;

font-size:
clamp(
6rem,
15vw,
10rem
);

color:var(--gold);

text-shadow:
0 0 35px rgba(
244,
193,
108,
.35
);

margin-bottom:20px;

}

.title{

font-family:
"Cinzel",
serif;

font-size:
clamp(
2rem,
5vw,
3.5rem
);

margin-bottom:30px;

color:var(--light);

}

.message{

font-size:1.7rem;

line-height:1.9;

max-width:700px;

margin:auto;

margin-bottom:50px;

}

.divider{

width:280px;

height:2px;

margin:50px auto;

background:

linear-gradient(
90deg,
transparent,
var(--gold),
transparent
);

position:relative;

}

.divider:after{

content:"✦";

position:absolute;

left:50%;

top:-15px;

transform:
translateX(-50%);

padding:0 12px;

background:var(--bg-main);

color:var(--gold);

}

.quote{

font-style:italic;

font-size:1.4rem;

color:var(--amber);

margin-bottom:60px;

}

.btn{

display:inline-block;

padding:18px 38px;

border-radius:999px;

text-decoration:none;

font-family:
"Cinzel",
serif;

background:

linear-gradient(
135deg,
#F4C16C,
#D68B44
);

color:#090909;

transition:.4s;

}

.btn:hover{

transform:
translateY(-4px);

box-shadow:

0 0 25px rgba(
244,
193,
108,
.35
);

}

.footer-note{

margin-top:60px;

font-size:1rem;

letter-spacing:4px;

text-transform:uppercase;

color:var(--gray);

}

</style>

</head>

<body>

<div class="container">

<div class="error">

404

</div>

<h1 class="title">

The Flame Is Still Burning

</h1>

<p class="message">

The page you were searching for could not be found.

A wrong turn happened somewhere along the journey, yet the story continues.

Revival still burns.

</p>

<div class="divider"></div>

<div class="quote">

"From one flame to a thousand fires."

</div>

<a
href="index.html"
class="btn">

Return Home

</a>

<div class="footer-note">

Written by Bradley Hobbs

</div>

</div>

</body>
</html>
